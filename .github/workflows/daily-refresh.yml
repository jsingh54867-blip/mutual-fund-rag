# Phase 3: Daily Refresh Pipeline
# Runs at 9:20 AM IST (3:50 UTC) every day
# Scrapes in-scope Groww pages, detects changes, re-embeds, and upserts to Chroma Cloud

name: Daily Refresh

on:
  schedule:
    # 3:50 UTC = 9:20 AM IST
    - cron: '50 3 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.12'
  CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
  CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
  CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r phase_1_mvp/requirements.txt
          pip install beautifulsoup4 requests sentence-transformers chromadb python-dotenv

      - name: Run scraping pipeline
        id: scrape
        run: |
          cd phase_1_mvp
          python -m ingestion.run_ingestion
        continue-on-error: true

      - name: Run smoke tests
        if: steps.scrape.outcome == 'success'
        run: |
          python phase_3_operational/smoke_tests.py

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-logs-${{ github.run_id }}
          path: |
            phase_1_mvp/data/logs/*.jsonl
          retention-days: 30

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily refresh pipeline failed!"
          echo "Check logs for details. Last successful index remains active."
          # In production, add Slack/email/webhook notification here

  retry:
    needs: refresh
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Wait 10 minutes before retry
        run: sleep 600

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r phase_1_mvp/requirements.txt
          pip install beautifulsoup4 requests sentence-transformers chromadb python-dotenv

      - name: Retry scraping pipeline
        run: |
          cd phase_1_mvp
          python -m ingestion.run_ingestion

      - name: Run smoke tests
        run: |
          python phase_3_operational/smoke_tests.py

      - name: Notify on retry failure
        if: failure()
        run: |
          echo "::error::Retry also failed. Last successful index remains active."
          echo "Manual intervention may be required."
